<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Gas Delivery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card">
            <h2 class="text-center">Welcome Back</h2>
            <p class="text-center mb-4" style="color: var(--text-secondary)">Login to your account to continue</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                
                <div id="errorMsg" style="color: #ef4444; font-weight: 500; text-align: center; margin-bottom: 1rem; display: none;"></div>

                <button type="submit" class="btn btn-primary w-100" id="loginBtn">Login</button>
            </form>
            
            <p class="text-center mt-4">
                Don't have an account? <a href="register.html" class="text-decoration-none">Sign up</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            try {
                btn.textContent = 'Logging in...';
                btn.disabled = true;
                errorMsg.style.display = 'none';

                const data = await apiCall('/auth/login', 'POST', { email, password });
                
                setAuth(data.token, data.user);
                
                if (data.user.role === 'customer') {
                    window.location.href = 'customer-dashboard.html';
                } else if (data.user.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'vendor-dashboard.html';
                }

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

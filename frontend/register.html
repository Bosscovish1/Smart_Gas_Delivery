<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Gas Delivery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container" style="margin: 2rem auto;">
        <div class="glass-card">
            <h2 class="text-center">Create Account</h2>
            <p class="text-center mb-4" style="color: var(--text-secondary)">Join the smart gas network</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="role">I am a...</label>
                    <select id="role" class="form-control" required>
                        <option value="customer">Customer (Buy Gas)</option>
                        <option value="vendor">Vendor (Sell Gas)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="name">Full Name or Business Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="Fresh Fresh">
                </div>

                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" required placeholder="mail@example.com">
                    </div>
                    <div>
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-control" required placeholder="+237 ...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Address / Location</label>
                    <input type="text" id="address" class="form-control" placeholder="Optional for customers">
                </div>

                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div>
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <div>
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" class="form-control" required>
                    </div>
                </div>
                
                <div id="vendorLocation" style="display: none; background: rgba(14, 165, 233, 0.1); padding: 1rem; border-radius: 8px; margin-bottom: 1.25rem;">
                    <p style="font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 500;">Location coordinates (Required for vendors)</p>
                    <button type="button" class="btn btn-secondary w-100" id="getLocationBtn" style="padding: 0.5rem; font-size: 0.9rem;">📍 Get My Current Location</button>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                        <input type="text" id="lat" class="form-control" style="font-size: 0.8rem; padding: 0.5rem;" placeholder="Latitude" readonly>
                        <input type="text" id="lng" class="form-control" style="font-size: 0.8rem; padding: 0.5rem;" placeholder="Longitude" readonly>
                    </div>
                </div>

                <div id="errorMsg" style="color: #ef4444; font-weight: 500; text-align: center; margin-bottom: 1rem; display: none;"></div>
                <div id="successMsg" style="color: #10b981; font-weight: 500; text-align: center; margin-bottom: 1rem; display: none;"></div>

                <button type="submit" class="btn btn-primary w-100" id="registerBtn">Create Account</button>
            </form>
            
            <p class="text-center mt-4">
                Already have an account? <a href="login.html" class="text-decoration-none">Login</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Set role from URL query param if present
        const urlParams = new URLSearchParams(window.location.search);
        const roleParam = urlParams.get('role');
        const roleSelect = document.getElementById('role');
        const vendorLocation = document.getElementById('vendorLocation');
        
        if (roleParam && (roleParam === 'customer' || roleParam === 'vendor')) {
            roleSelect.value = roleParam;
        }

        // Toggle Vendor Location UI
        function toggleVendorLocation() {
            if (roleSelect.value === 'vendor') {
                vendorLocation.style.display = 'block';
            } else {
                vendorLocation.style.display = 'none';
            }
        }
        roleSelect.addEventListener('change', toggleVendorLocation);
        toggleVendorLocation(); // Initial check

        // Get Location
        document.getElementById('getLocationBtn').addEventListener('click', () => {
            if (navigator.geolocation) {
                const btn = document.getElementById('getLocationBtn');
                btn.textContent = 'Getting location...';
                btn.disabled = true;
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        document.getElementById('lat').value = position.coords.latitude;
                        document.getElementById('lng').value = position.coords.longitude;
                        btn.textContent = '📍 Location Captured';
                        btn.style.backgroundColor = 'rgba(16, 185, 129, 0.2)';
                        btn.style.borderColor = '#10b981';
                        btn.style.color = '#059669';
                    },
                    (error) => {
                        alert('Could not get location. Please ensure location services are enabled.');
                        btn.textContent = '📍 Get My Current Location';
                        btn.disabled = false;
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        });

        // Submit form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (password !== confirm_password) {
                errorMsg.textContent = "Passwords do not match!";
                errorMsg.style.display = 'block';
                return;
            }

            const payload = {
                role: roleSelect.value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password,
                address: document.getElementById('address').value
            };

            if (payload.role === 'vendor') {
                const lat = document.getElementById('lat').value;
                const lng = document.getElementById('lng').value;
                if (!lat || !lng) {
                    errorMsg.textContent = "Vendors MUST provide their location!";
                    errorMsg.style.display = 'block';
                    return;
                }
                payload.lat = parseFloat(lat);
                payload.lng = parseFloat(lng);
            }

            try {
                btn.textContent = 'Creating...';
                btn.disabled = true;

                await apiCall('/auth/register', 'POST', payload);
                
                successMsg.textContent = 'Account created successfully! Redirecting...';
                successMsg.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
